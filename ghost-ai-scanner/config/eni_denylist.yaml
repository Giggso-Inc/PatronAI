# =============================================================
# FILE: config/eni_denylist.yaml
# VERSION: 2.0.0
# UPDATED: 2026-06-11
# OWNER: Giggso Inc
# PURPOSE: Defines the 5 classes of OCI-managed VNICs that must be
#          filtered before VCN Flow Log normalisation. Each class
#          will never produce AI signals. Filtering here saves
#          OCI Object Storage cost and scanner CPU on every scan cycle.
#          OCI migration: replaced AWS ENI types with OCI VNIC equivalents.
# LOADED BY: src/normalizer/eni_filter.py — load_eni_patterns()
# AUDIT LOG:
#   v1.0.0  2026-04-19  Initial (AWS ENI denylist — 5 rule types)
#   v2.0.0  2026-06-11  OCI migration — AWS ENI types → OCI VNIC equivalents:
#                         EFS mount target     → OCI File Storage mount target
#                         NAT Gateway          → OCI NAT Gateway
#                         VPC Endpoint         → OCI Service Gateway
#                         ELB                  → OCI Load Balancer
#                         Lambda VPC ENI       → OCI Functions VNIC
# =============================================================

rules:

  efs:
    # OCI File Storage mount target VNICs.
    # Equivalent of AWS EFS mount targets.
    # All flow log rows are NODATA (no real AI traffic).
    # Match on description prefix.
    description_prefix: "File Storage"
    requester_id: ""
    reason: "oci_file_storage"

  nat:
    # OCI NAT Gateway VNICs aggregate ALL outbound traffic from
    # private subnets. They mask the real originating OCI VM.
    # PatronAI matches on destination domain — NAT VNICs add noise.
    interface_type: "nat_gateway"
    reason: "oci_nat_gateway"

  vpce:
    # OCI Service Gateway VNICs carry OCI service traffic that stays
    # within the OCI backbone (Object Storage, etc).
    # Equivalent of AWS VPC Endpoints (PrivateLink).
    # These destinations are never AI providers.
    interface_type: "vpc_endpoint"
    reason: "oci_service_gateway"

  elb:
    # OCI Load Balancer VNICs handle inbound traffic distribution.
    # Equivalent of AWS ELB. PatronAI needs the originating src_ip,
    # not the load balancer hop.
    description_prefix: "LB "
    reason: "oci_load_balancer"

  lambda:
    # OCI Functions VNICs — created when a Function is attached to a VCN.
    # Equivalent of AWS Lambda VPC ENIs.
    # Idle functions emit continuous NODATA flows.
    description_prefix: "OCI Functions"
    reason: "oci_functions"
