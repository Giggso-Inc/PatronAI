# =============================================================
# FILE: docker-compose.yml
# VERSION: 1.4.0
# UPDATED: 2026-06-11
# OWNER: Giggso Inc
# PURPOSE: Production docker-compose for single OCI Compute VM.
#          Three containers: scanner, grafana, nginx.
#          Reads all config from .env generated by prereqs_oci.sh.
# USAGE: bash scripts/start.sh   (preferred — handles env hygiene)
#    OR: docker compose up -d
# REQUIRES: .env file generated by prereqs_oci.sh
# AUDIT LOG:
#   v1.0.0  2026-04-19  Initial (AWS EC2).
#   v1.1.0  2026-04-29  Chat data backend env vars + Grafana password
#                       fail-loud + chat retention.
#   v1.2.0  2026-05-02  Stop interpolating AWS_ACCESS_KEY_ID /
#                       AWS_SECRET_ACCESS_KEY / AWS_REGION via ${VAR}
#                       in `environment:`. Rely solely on env_file: .env.
#   v1.3.0  2026-06-11  OCI migration:
#   v1.4.0  2026-06-11  CLOUD_PROVIDER default changed aws → oci.
#                       AWS_REGION comment updated: boto3 variable name,
#                       stores OCI region (us-chicago-1).
#                       - Added S3_ENDPOINT_URL for OCI Object Storage
#                         S3-compatible endpoint (boto3 requires this
#                         to reach OCI instead of AWS).
#                       - Updated comments: EC2 → OCI VM, S3 → OCI
#                         Object Storage, SNS → OCI Notifications (ONS).
#                       - Nginx: added 443 SSL port + domaincert volume
#                         mount (patronai.giggso.com SSL cert).
#                       - GF_SERVER_ROOT_URL: dynamic → hardcoded to
#                         https://patronai.giggso.com/grafana (OCI domain).
# =============================================================

services:

  # ── Scanner + Streamlit ─────────────────────────────────────
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patronai
    restart: unless-stopped
    env_file: .env
    environment:
      # ── DO NOT interpolate AWS_* / OCI_* here ──────────────────────
      # NOTE: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION are
      # boto3 (Python S3 SDK) required variable names. They store OCI
      # Customer Secret Key values — not AWS credentials.
      # `env_file: .env` injects credentials directly into the container
      # at start, ALWAYS reading fresh from disk. If we instead listed
      # them as `${VAR}` here, docker-compose would substitute from the
      # SHELL environment — which can be stale from a previous source .env.
      # See the bug write-up in the v1.2.0 audit log entry.
      #
      # PATRONAI_BUCKET is preferred; MARAUDER_SCAN_BUCKET accepted as legacy alias.
      - MARAUDER_SCAN_BUCKET=${PATRONAI_BUCKET:-${MARAUDER_SCAN_BUCKET:-}}
      - COMPANY_NAME=${COMPANY_NAME}
      - COMPANY_SLUG=${COMPANY_SLUG}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      # SUPPORT_EMAILS — comma-separated; sees Support view + Manager + Exec
      - SUPPORT_EMAILS=${SUPPORT_EMAILS:-}
      - ALERT_SNS_ARN=${ALERT_SNS_ARN:-}
      - TRINITY_WEBHOOK_URL=${TRINITY_WEBHOOK_URL}
      - LOGANALYZER_WEBHOOK_URL=${LOGANALYZER_WEBHOOK_URL}
      # OCI Email Delivery / alert email settings
      - ALERT_RECIPIENTS=${ALERT_RECIPIENTS:-}
      - PATRONAI_FROM_EMAIL=${PATRONAI_FROM_EMAIL:-noreply@patronai.ai}
      - SCAN_INTERVAL_SECS=${SCAN_INTERVAL_SECS:-300}
      - DEDUP_WINDOW_MINUTES=${DEDUP_WINDOW_MINUTES:-60}
      - CROWDSTRIKE_ENABLED=${CROWDSTRIKE_ENABLED:-false}
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-oci}
      - STREAMLIT_PORT=8501
      # PUBLIC_HOST = OCI VM public IP or DNS, e.g. 129.213.10.5
      # GRAFANA_URL = full Grafana base URL, e.g. https://patronai.giggso.com/grafana
      # If GRAFANA_URL is set it takes precedence over PUBLIC_HOST
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - GRAFANA_URL=${GRAFANA_URL:-}
      # ── OCI Object Storage S3-compatible endpoint ────────────────────
      # REQUIRED for OCI — boto3 uses this instead of the default AWS endpoint.
      # Format: https://<namespace>.compat.objectstorage.<region>.oraclecloud.com
      # Generated by prereqs_oci.sh → written to .env as S3_ENDPOINT_URL.
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      # LLM chat — llama-server runs inside the container on :8080
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compat}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:8080}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_REPO=${LLM_MODEL_REPO:-LiquidAI/LFM2.5-1.2B-Thinking-GGUF}
      # ── Chat data backend (OCI Object Storage hourly rollups) ────────
      # Hourly rollup job aggregates findings/.../jsonl into per-user
      # and per-tenant dimension files for the chat tools to query.
      - ROLLUP_HOURLY_OFFSET_MINUTES=${ROLLUP_HOURLY_OFFSET_MINUTES:-5}
      # First-deploy backfill: when no rollups exist yet, process the last
      # N days so chat has historical data to answer over from the start.
      - ROLLUP_INITIAL_BACKFILL_DAYS=${ROLLUP_INITIAL_BACKFILL_DAYS:-7}
      # LLM read timeout (seconds).
      - LLM_READ_TIMEOUT_S=${LLM_READ_TIMEOUT_S:-180}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-384}
      - LLM_PARALLEL_SLOTS=${LLM_PARALLEL_SLOTS:-1}
      - LLM_CTX_SIZE=${LLM_CTX_SIZE:-16384}
      # Chat conversation OCI Object Storage retention.
      - CHAT_HISTORY_RETENTION_DAYS=${CHAT_HISTORY_RETENTION_DAYS:-30}
      - DOCS_REFRESH_INTERVAL_S=${DOCS_REFRESH_INTERVAL_S:-300}
    volumes:
      - patronai-models:/models
    ports:
      - "8501:8501"
    networks:
      - marauder-scan
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    container_name: marauder-scan-grafana
    restart: unless-stopped
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # Fail-loud if missing: exits compose stack startup with an explicit
      # error rather than booting Grafana with a known default password.
      # Set GF_SECURITY_ADMIN_PASSWORD in .env (generated by prereqs_oci.sh).
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_USERS_DEFAULT_THEME=light
      # OCI domain — hardcoded so Grafana knows it lives at /grafana subpath.
      - GF_SERVER_ROOT_URL=https://patronai.giggso.com/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    networks:
      - marauder-scan
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: marauder-scan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/domaincert:/etc/nginx/certs
    networks:
      - marauder-scan
    depends_on:
      - scanner
      - grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  marauder-scan:
    driver: bridge

volumes:
  grafana-data:
    driver: local
  patronai-models:
    driver: local
