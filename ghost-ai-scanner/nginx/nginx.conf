# =============================================================
# FILE: nginx/nginx.conf
# VERSION: 1.3.0
# UPDATED: 2026-06-11
# OWNER: Giggso Inc
# PURPOSE: Nginx reverse proxy for PatronAI on OCI.
#          Routes /grafana/ to Grafana :3000
#          Routes / (default) to Streamlit :8501
#          HTTP → HTTPS redirect on port 80
# AUDIT LOG:
#   v1.0.0  2026-04-18  Initial (AWS EC2 — migrated to OCI)
#   v1.1.0  2026-04-19  X-Forwarded-Prefix on /grafana/; default → Streamlit
#   v1.2.0  2026-06-10  Fix: location / was routing to grafana causing
#                       infinite 301 redirect loop. Corrected to streamlit.
#                       Added HTTP→HTTPS redirect on port 80.
#   v1.3.0  2026-06-11  OCI migration:
#                       Fix: proxy_pass http://grafana/ → http://grafana
#                       (trailing slash stripped /grafana prefix causing 301 loop).
#                       Added /_stcore/stream websocket block for Streamlit.
#                       Consolidated /settings blocks into / (Streamlit at root).
# =============================================================

events {
    worker_connections 256;
}

http {

    upstream grafana {
        server grafana:3000;
    }

    upstream streamlit {
        server scanner:8501;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name patronai.giggso.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name patronai.giggso.com;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Streamlit websocket ───────────────────────────────
        # Must be before location / so nginx matches this first.
        # Streamlit is at root so the websocket path is /_stcore/stream.
        location /_stcore/stream {
            proxy_pass         http://streamlit/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 86400;
        }

        # ── Default → Streamlit (PatronAI scanner) ───────────
        # Covers all Streamlit paths including /settings, /dashboard etc.
        location / {
            proxy_pass         http://streamlit;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── Grafana subpath ───────────────────────────────────
        # No trailing slash on proxy_pass — lets Grafana see the
        # full /grafana/ path and match its GF_SERVER_ROOT_URL.
        # X-Forwarded-Prefix tells Grafana it lives at /grafana.
        location /grafana/ {
            proxy_pass         http://grafana;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Prefix /grafana;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
