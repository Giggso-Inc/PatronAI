# =============================================================
# FILE: nginx/nginx.conf
# VERSION: 1.3.0
# UPDATED: 2026-06-12
# OWNER: Giggso Inc
# PURPOSE: Nginx reverse proxy for PatronAI.
#          Routes /grafana/ to Grafana :3000
#          Routes / (default) to Streamlit :8501
#          Routes /agent/ to Integration API :8002
# AUDIT LOG:
#   v1.0.0  2026-04-18  Initial
#   v1.1.0  2026-04-19  X-Forwarded-Prefix on /grafana/; default → Streamlit
#   v1.2.0  2026-06-10  Fix infinite 301 redirect loop. HTTP→HTTPS redirect.
#   v1.3.0  2026-06-12  Added /agent/ routes for Integration API :8002
# =============================================================

events {
    worker_connections 256;
}

http {
    upstream grafana {
        server grafana:3000;
    }

    upstream streamlit {
        server scanner:8501;
    }

    upstream integration_api {
        server scanner:8002;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name patronai.giggso.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name patronai.giggso.com;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Default → Streamlit (PatronAI scanner) ───────────
        location / {
            proxy_pass         http://streamlit;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── Grafana subpath ───────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Prefix /grafana;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ── Integration API ───────────────────────────────────
        location /agent/ {
            proxy_pass         http://integration_api/agent/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        # ── healthz ───────────────────────────────────────────
        location /healthz {
            proxy_pass         http://integration_api/healthz;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /_stcore/stream {
            proxy_pass         http://streamlit/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 86400;
        }
    }
}
