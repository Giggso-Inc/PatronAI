# =============================================================
# FILE: docker-compose.dev.yml
# VERSION: 2.0.0
# UPDATED: 2026-06-11
# OWNER: Giggso Inc
# PURPOSE: Development / offline demo compose for OCI.
#          Uses LocalStack for S3-compatible Object Storage simulation.
#          No real OCI account needed for local development.
# USAGE: docker-compose -f docker-compose.dev.yml up -d
# AUDIT LOG:
#   v1.0.0  2026-04-18  Initial (AWS LocalStack)
#   v2.0.0  2026-06-11  OCI migration — updated env vars to OCI naming.
#                       LocalStack still used for S3-compat simulation.
#                       CLOUD_PROVIDER=oci, region us-chicago-1.
#                       Removed SNS — using webhook only in dev.
#                       Added S3_ENDPOINT_URL pointing to LocalStack.
# =============================================================

version: "3.9"

services:

  # ── LocalStack — OCI Object Storage simulation ───────────────
  # LocalStack provides S3-compatible API — same API OCI Object Storage uses.
  # In production this is replaced by real OCI Object Storage via S3_ENDPOINT_URL.
  localstack:
    image: localstack/localstack:3.4
    container_name: marauder-scan-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-chicago-1
      - DEBUG=0
      - DATA_DIR=/var/lib/localstack/data
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - marauder-scan
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── LocalStack seed — creates bucket and uploads config ──────
  localstack-seed:
    image: amazon/aws-cli:2.15.0
    container_name: marauder-scan-localstack-seed
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - marauder-scan
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-chicago-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - ./config:/config:ro
    command: |
      sh -c "
        echo 'Seeding LocalStack (OCI Object Storage simulation)...' &&
        aws s3 mb s3://marauder-scan-demo --endpoint-url http://localstack:4566 &&
        aws s3 cp /config/settings.json s3://marauder-scan-demo/config/settings.json --endpoint-url http://localstack:4566 &&
        aws s3 cp /config/authorized.csv s3://marauder-scan-demo/config/authorized.csv --endpoint-url http://localstack:4566 &&
        aws s3 cp /config/unauthorized.csv s3://marauder-scan-demo/config/unauthorized.csv --endpoint-url http://localstack:4566 &&
        echo 'LocalStack seeded successfully'
      "

  # ── Scanner — points at LocalStack (OCI Object Storage simulation) ──
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marauder-scan
    restart: unless-stopped
    depends_on:
      localstack-seed:
        condition: service_completed_successfully
    environment:
      - MARAUDER_SCAN_BUCKET=marauder-scan-demo
      - AWS_REGION=us-chicago-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # S3_ENDPOINT_URL points to LocalStack for dev — in production points to OCI Object Storage
      - S3_ENDPOINT_URL=http://localstack:4566
      - COMPANY_NAME=Acme Corp (Demo)
      - COMPANY_SLUG=demo
      - ALLOWED_EMAILS=demo@giggso.com
      - ADMIN_EMAILS=demo@giggso.com
      - ALERT_SNS_ARN=
      - SCAN_INTERVAL_SECS=60
      - DEDUP_WINDOW_MINUTES=5
      - CROWDSTRIKE_ENABLED=false
      - CLOUD_PROVIDER=oci
      - STREAMLIT_PORT=8501
      - GRAFANA_URL=http://grafana:3000
    ports:
      - "8501:8501"
    networks:
      - marauder-scan
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    container_name: marauder-scan-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=demo
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    ports:
      - "3000:3000"
    networks:
      - marauder-scan
    volumes:
      - grafana-data-dev:/var/lib/grafana

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: marauder-scan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - marauder-scan
    depends_on:
      - scanner
      - grafana

networks:
  marauder-scan:
    driver: bridge

volumes:
  localstack-data:
    driver: local
  grafana-data-dev:
    driver: local
